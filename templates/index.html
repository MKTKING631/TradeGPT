<!DOCTYPE html>
<html>
<head>
    <title>TradeGPT Chat</title>

    <style>
        body {
            background: #0b0f1a;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        #chatbox {
            width: 90%;
            max-width: 500px;
            margin: auto;
            height: 400px;
            overflow-y: auto;
            border: 1px solid gray;
            padding: 10px;
        }

        input {
            padding: 10px;
            width: 60%;
        }

        button {
            padding: 10px;
            background: #4da6ff;
            border: none;
            color: white;
        }

        .user { color: #4da6ff; }
        .bot { color: #00ff88; }
    </style>
</head>

<body>

<h1>🤖 TradeGPT Chat</h1>

<div id="chatbox"></div>

<br>

<input id="msg" placeholder="Enter stock (AAPL)">
<button onclick="sendMsg()">Send</button>

<script>
async function sendMsg() {
    let input = document.getElementById("msg");
    let message = input.value;

    if (!message) return;

    let chatbox = document.getElementById("chatbox");

    chatbox.innerHTML += `<p class="user">You: ${message}</p>`;

    input.value = "";

    let res = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: message})
    });

    let data = await res.json();

    chatbox.innerHTML += `<p class="bot">TradeGPT: ${data.reply}</p>`;
    chatbox.scrollTop = chatbox.scrollHeight;
}
</script>

</body>
