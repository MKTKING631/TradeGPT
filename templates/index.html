<!DOCTYPE html>
<html>
<head>
    <title>TradeGPT</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        h1 {
            color: #38bdf8;
        }

        #chatbox {
            width: 400px;
            margin: auto;
            border: 1px solid #334155;
            padding: 10px;
            border-radius: 10px;
            background: #1e293b;
        }

        #messages {
            height: 300px;
            overflow-y: auto;
            text-align: left;
            padding: 5px;
        }

        .user {
            color: #22c55e;
        }

        .bot {
            color: #facc15;
        }

        input {
            width: 70%;
            padding: 8px;
            border-radius: 5px;
            border: none;
        }

        button {
            padding: 8px 12px;
            border: none;
            background: #38bdf8;
            color: black;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0ea5e9;
        }
    </style>
</head>

<body>

    <h1>📈 TradeGPT</h1>

    <div id="chatbox">
        <div id="messages"></div>

        <input type="text" id="userInput" placeholder="Enter stock (AAPL, TSLA)">
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        async function sendMessage() {
            let input = document.getElementById("userInput");
            let message = input.value.trim();

            if (message === "") return;

            let messages = document.getElementById("messages");

            // User message
            messages.innerHTML += `<p class="user"><b>You:</b> ${message}</p>`;

            // Send request
            let response = await fetch("/chat", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({message: message})
            });

            let data = await response.json();

            // Bot reply
            messages.innerHTML += `<p class="bot"><b>TradeGPT:</b> ${data.reply}</p>`;

            // Scroll down
            messages.scrollTop = messages.scrollHeight;

            input.value = "";
        }
    </script>

</body>
</html>
