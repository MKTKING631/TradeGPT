<!DOCTYPE html>
<html>
<head>
    <title>TradeGPT Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0b0f1a;
            color: white;
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 200px;
            background: #111827;
            padding: 20px;
            height: 100vh;
        }

        .sidebar h2 {
            color: #4da6ff;
        }

        .sidebar a {
            display: block;
            color: white;
            margin: 15px 0;
            text-decoration: none;
        }

        /* Main */
        .main {
            flex: 1;
            padding: 20px;
        }

        .topbar {
            font-size: 24px;
            margin-bottom: 20px;
        }

        input {
            padding: 10px;
            width: 200px;
            border-radius: 5px;
            border: none;
        }

        button {
            padding: 10px;
            background: #4da6ff;
            border: none;
            color: white;
            border-radius: 5px;
        }

        .card {
            margin-top: 20px;
            padding: 15px;
            background: #111827;
            border-radius: 10px;
        }

        canvas {
            margin-top: 20px;
        }

        .buy { color: #00ff88; }
        .sell { color: #ff4d4d; }
    </style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2>TradeGPT</h2>
    <a href="#">Dashboard</a>
    <a href="#">Portfolio</a>
    <a href="#">Market</a>
</div>

<!-- Main Content -->
<div class="main">

    <div class="topbar">📊 Trading Dashboard</div>

    <form method="POST">
        <input name="stock" placeholder="Enter stock (AAPL)" required>
        <button type="submit">Analyze</button>
    </form>

    <div class="card">
        <h2>{{ result }}</h2>
        <h3>{{ trend }}</h3>

        <h2 class="{% if signal == 'BUY 🟢' %}buy{% else %}sell{% endif %}">
            {{ signal }}
        </h2>

        <p>RSI: {{ rsi }}</p>
        <p>MA Signal: {{ ma_signal }}</p>
    </div>

    <canvas id="chart"></canvas>

</div>

<script>
    let prices = {{ prices | tojson }};

    if (prices.length > 0) {
        new Chart(document.getElementById("chart"), {
            type: 'line',
            data: {
                labels: prices.map((_, i) => "Day " + (i+1)),
                datasets: [{
                    label: "Stock Price",
                    data: prices,
                    borderColor: "#4da6ff",
                    tension: 0.3
                }]
            }
        });
    }
</script>

</body>
</html>
