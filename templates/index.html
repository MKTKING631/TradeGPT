<!DOCTYPE html>
<html>
<head>
    <title>TradeGPT</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body style="background:black;color:white;text-align:center;">

<h1>📈 TradeGPT</h1>

<form method="POST">
    <input name="stock" placeholder="Enter stock (AAPL)" required>
    <button type="submit">Analyze</button>
</form>

<h2>{{ result }}</h2>
<h3>{{ trend }}</h3>
<h3>{{ signal }}</h3>

<canvas id="chart"></canvas>

<script>
    let prices = {{ prices | tojson if prices else [] }};

    if (prices.length > 0) {
        new Chart(document.getElementById("chart"), {
            type: 'line',
            data: {
                labels: prices.map((_, i) => "Day " + (i+1)),
                datasets: [{
                    label: "Stock Price",
                    data: prices
                }]
            }
        });
    }
</script>

</body>
</html>
