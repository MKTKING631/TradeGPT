<!DOCTYPE html>
<html>
<head>
    <title>TradeGPT Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0b0f1a;
            color: white;
        }

        .header {
            background: #111827;
            padding: 15px;
            text-align: center;
            font-size: 22px;
            color: #4da6ff;
        }

        .container {
            padding: 20px;
            text-align: center;
        }

        input {
            padding: 10px;
            width: 200px;
            border-radius: 5px;
            border: none;
        }

        button {
            padding: 10px;
            background: #4da6ff;
            border: none;
            color: white;
            border-radius: 5px;
        }

        .card {
            margin-top: 20px;
            padding: 15px;
            background: #111827;
            border-radius: 10px;
        }

        canvas {
            margin-top: 20px;
        }

        .buy { color: #00ff88; }
        .sell { color: #ff4d4d; }
    </style>
</head>

<body>

<div class="header">🚀 TradeGPT Pro</div>

<div class="container">

    <form method="POST">
        <input name="stock" placeholder="Enter stock (AAPL)" required>
        <button type="submit">Analyze</button>
    </form>

    <div class="card">
        <h2>{{ result }}</h2>
        <h3>{{ trend }}</h3>
        <h2 class="{% if signal == 'BUY 🟢' %}buy{% else %}sell{% endif %}">
            {{ signal }}
        </h2>
    </div>

    <canvas id="chart"></canvas>

</div>

<script>
    let prices = {{ prices | tojson | safe }};
    
    if (prices && prices.length > 0) {
        new Chart(document.getElementById("chart"), {
            type: 'line',
            data: {
                labels: prices.map((_, i) => "Day " + (i+1)),
                datasets: [{
                    label: "Price",
                    data: prices,
                    borderWidth: 2
                }]
            }
        });
    }
</script>

</body>
